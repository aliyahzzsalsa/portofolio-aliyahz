<div class="container" style="margin-top: 150px; margin-bottom: 100px;">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center mb-5">
            <h2 class="fw-bold display-6">Let's <span style="color: var(--primary-blue)">Connect</span></h2>
            <p class="text-muted">Kirimkan pesan melalui email untuk kerja sama yang lebih formal.</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="contact-card p-4 shadow-sm border rounded">
                <form id="contactForm">
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Nama Lengkap</label>
                        <input type="text" name="from_name" id="userName" class="form-control py-2" placeholder="Masukkan Nama Anda" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Email Anda</label>
                        <input type="email" name="user_email" id="userEmail" class="form-control py-2" placeholder="nama@email.com" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="fw-bold mb-2">Pesan</label>
                        <textarea name="message" id="userMessage" class="form-control" rows="5" placeholder="Apa yang ingin kamu sampaikan?" required></textarea>
                    </div>
                    
                    <button type="submit" id="btnSend" class="btn-send mt-2 w-100 py-3 text-black fw-bold">Kirim ke Email</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="script.js"></script>

<script type="text/javascript">
   (function(){

      emailjs.init("O0Et9X7PKbdB3IY1G");
   })();

   document.getElementById('contactForm').addEventListener('submit', function(event) {
      event.preventDefault();
      
      const btn = document.getElementById('btnSend');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sedang Mengirim...';
      btn.disabled = true;

      emailjs.sendForm('service_zyx505q', 'template_xai23br', this)
        .then(function() {
            alert('Pesan Anda telah diterima. Detailnya akan segera ditinjau untuk langkah kolaborasi selanjutnya📩✨');
            btn.innerHTML = 'Kirim ke Email';
            btn.disabled = false;
            document.getElementById('contactForm').reset(); 
        }, function(error) {
            alert('Yah, gagal kirim: ' + JSON.stringify(error));
            btn.innerHTML = 'Kirim ke Email';
            btn.disabled = false;
        });
   });
</script>
